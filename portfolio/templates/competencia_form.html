{% extends "base.html" %}
{% block content %}
<h2>{% if form.instance.pk %}Editar{% else %}Nova{% endif %} Competência</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'competencias' %}">Cancelar</a>
</form>
{% endblock %}
