{% extends "base.html" %}
{% block content %}
<h2>Apagar Tecnologia</h2>
<p>Tens a certeza que queres apagar <strong>{{ tecnologia.nome }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sim, apagar</button>
    <a href="{% url 'tecnologias' %}">Cancelar</a>
</form>
{% endblock %}
