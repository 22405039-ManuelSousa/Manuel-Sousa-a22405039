{% extends "base.html" %}
{% block content %}
<h2>{% if form.instance.pk %}Editar{% else %}Nova{% endif %} Tecnologia</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'tecnologias' %}">Cancelar</a>
</form>
{% endblock %}
