{% extends "base.html" %}
{% block content %}
<h2>Apagar Competência</h2>
<p>Tens a certeza que queres apagar <strong>{{ competencia.nome }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sim, apagar</button>
    <a href="{% url 'competencias' %}">Cancelar</a>
</form>
{% endblock %}
