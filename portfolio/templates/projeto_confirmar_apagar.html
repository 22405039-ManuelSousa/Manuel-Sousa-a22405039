{% extends "base.html" %}
{% block content %}
<h2>Apagar Projeto</h2>
<p>Tens a certeza que queres apagar <strong>{{ projeto.titulo }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sim, apagar</button>
    <a href="{% url 'projetos' %}">Cancelar</a>
</form>
{% endblock %}
