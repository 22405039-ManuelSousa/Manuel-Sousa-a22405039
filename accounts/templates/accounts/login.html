{% extends "base.html" %}
{% block content %}
<h2>Login</h2>

{% if mensagem %}<p style="color:red">{{ mensagem }}</p>{% endif %}
{% if mensagem_info %}<p style="color:green">{{ mensagem_info }}</p>{% endif %}

<form method="post">
    {% csrf_token %}
    <p><label>Utilizador: <input type="text" name="username"></label></p>
    <p><label>Password: <input type="password" name="password"></label></p>
    <button type="submit">Entrar</button>
</form>

<hr>
<h3>Ou entra com link mágico</h3>
<form method="get" action="{% url 'login_magic_link' %}">
    <p><label>Email: <input type="email" name="email"></label></p>
    <button type="submit">Enviar link</button>
</form>

<p>Não tens conta? <a href="{% url 'registo' %}">Regista-te</a></p>
{% endblock %}
